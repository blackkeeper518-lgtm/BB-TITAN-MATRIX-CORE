<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB TITAN MATRIX CORE V.61 - AI SOVEREIGN</title>
    
    <!-- ⚡ HIGH-POWERED NEURAL LIBRARIES (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 📦 FIREBASE SDKS (COMPAT VERSION) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- 🎨 ICONS -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010102; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .nebula { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: background 0.8s ease; }
        .glass { background: rgba(8, 8, 12, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .matrix-text { text-shadow: 0 0 15px currentColor; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { animation: ticker 25s linear infinite; }
        .radar-pulse { animation: pulse-red 2s infinite ease-out; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 🛡️ SECURITY & CONFIG GATEWAY ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'darkside-bb-v4';
        const apiKey = ""; // Gemini API Key

        // Initialize Firebase
        if (firebaseConfig.apiKey) {
            firebase.initializeApp(firebaseConfig);
        }

        // --- ✨ AI NEURAL LINK ENGINE (GEMINI) ---
        const callGemini = async (prompt, systemPrompt = "You are the TITAN MATRIX AI. Supreme Military Strategist. Response in Thai.") => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Signal Severed.";
            } catch (e) { return "AI Link Refused."; }
        };

        // --- 🏗️ MAIN COMMAND CENTER ---
        function App() {
            const [brand, setBrand] = useState('BB');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [orders, setOrders] = useState([]);
            const [isBriefing, setIsBriefing] = useState(false);
            const [aiBriefing, setAiBriefing] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [psidInput, setPsidInput] = useState('');
            const [chatInput, setChatInput] = useState('');
            const [aiChat, setAiChat] = useState([]);
            const [isChatting, setIsChatting] = useState(false);

            const theme = useMemo(() => brand === 'BB' ? {
                primary: '#f0abfc', glow: '#e879f9', text: 'BB STORE', table: 'bb_orders_master', icon: 'stars'
            } : {
                primary: '#fed7aa', glow: '#fb923c', text: 'SINGTO', table: 'st_orders_master', icon: 'cat'
            }, [brand]);

            const stats = useMemo(() => ({
                total: orders.reduce((s, o) => s + (Number(o.cod_amount) || 0), 0),
                count: orders.length,
                ready: orders.filter(o => o.strike_status === 'ready').length,
                missing: orders.filter(o => !o.psid).length
            }), [orders]);

            // Sync with Firestore
            useEffect(() => {
                if (!firebase.apps.length) return;
                const db = firebase.firestore();
                const unsubscribe = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(theme.table)
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setOrders(data.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                    });
                return () => unsubscribe();
            }, [brand, theme.table]);

            // AI BRIEFING
            const generateBriefing = async () => {
                setIsBriefing(true);
                const result = await callGemini(`Briefing for ${brand}: Revenue ฿${stats.total}, Targets ${stats.count}, Missing PSID ${stats.missing}. Military tone.`);
                setAiBriefing(result);
                setIsBriefing(false);
            };

            // AI CHAT
            const sendChat = async () => {
                if (!chatInput.trim()) return;
                const msg = chatInput;
                setAiChat(p => [...p, { role: 'user', text: msg }]);
                setChatInput('');
                setIsChatting(true);
                const response = await callGemini(msg);
                setAiChat(p => [...p, { role: 'ai', text: response }]);
                setIsChatting(false);
            };

            const handleSavePsid = async (id) => {
                if (!psidInput.trim()) return;
                const db = firebase.firestore();
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection(theme.table).doc(id)
                    .update({ psid: psidInput.trim(), strike_status: 'ready' });
                setEditingId(null);
                setPsidInput('');
            };

            useEffect(() => { lucide.createIcons(); });

            return (
                <div className="relative min-h-screen pb-20">
                    <div className="nebula" style={{ background: `radial-gradient(circle at 50% 50%, ${brand === 'BB' ? 'rgba(147,51,234,0.08)' : 'rgba(234,88,12,0.06)'}, transparent 70%)` }} />
                    
                    <nav className="sticky top-0 z-50 p-4 border-b border-white/5 bg-black/40 backdrop-blur-2xl flex justify-between items-center px-6 md:px-12">
                        <div className="flex items-center gap-4">
                            <div className="p-2 bg-white/5 rounded-xl border border-white/10" style={{color: theme.primary}}>
                                <i data-lucide={theme.icon}></i>
                            </div>
                            <span className="font-black uppercase tracking-tighter text-xl" style={{color: theme.primary}}>{theme.text} COMMAND</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setBrand(brand === 'BB' ? 'SINGTO' : 'BB')} className="p-2 text-white/30 hover:text-white"><i data-lucide="refresh-cw"></i></button>
                            <div className="flex bg-white/5 p-1 rounded-xl">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'dashboard' ? 'bg-white text-black' : 'text-white/30'}`}>DASHBOARD</button>
                                <button onClick={() => setActiveTab('vault')} className={`px-4 py-1.5 rounded-lg text-xs font-black ${activeTab === 'vault' ? 'bg-white text-black' : 'text-white/30'}`}>VAULT</button>
                            </div>
                        </div>
                    </nav>

                    <main className="relative z-10 p-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass p-6 grid grid-cols-2 gap-4 border-b-4" style={{borderBottomColor: theme.primary}}>
                                <div><span className="text-[10px] opacity-30 font-black uppercase">Revenue</span><div className="text-2xl font-light">฿{stats.total.toLocaleString()}</div></div>
                                <div><span className="text-[10px] opacity-30 font-black uppercase">Assets</span><div className="text-2xl font-light">{stats.count}</div></div>
                            </div>

                            <div className="glass p-6 space-y-4 border-l-4" style={{borderLeftColor: theme.primary}}>
                                <div className="flex justify-between items-center font-black text-xs uppercase opacity-50">
                                    <span>✨ AI Briefing</span>
                                    <button onClick={generateBriefing} className="p-1 hover:scale-125 transition-all text-yellow-400">
                                        {isBriefing ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="zap"></i>}
                                    </button>
                                </div>
                                {aiBriefing && <div className="text-sm font-mono text-white/70 italic bg-black/30 p-3 rounded-lg">"{aiBriefing}"</div>}
                            </div>

                            <div className="glass p-4 h-[350px] flex flex-col border border-white/5 shadow-2xl">
                                <span className="text-[10px] font-black uppercase opacity-20 mb-4 tracking-widest">Neural Chat</span>
                                <div className="flex-1 overflow-y-auto space-y-3 font-mono text-[11px]">
                                    {aiChat.map((c, i) => (
                                        <div key={i} className={`flex ${c.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`p-3 rounded-xl max-w-[90%] ${c.role === 'user' ? 'bg-white/10' : 'bg-purple-900/30 border border-purple-500/20'}`}>{c.text}</div>
                                        </div>
                                    ))}
                                    {isChatting && <i data-lucide="loader-2" className="animate-spin w-3 h-3 opacity-20"></i>}
                                </div>
                                <div className="mt-4 flex gap-2">
                                    <input value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendChat()} className="flex-1 bg-black border border-white/10 rounded-lg p-2 text-xs outline-none" placeholder="Command..." />
                                    <button onClick={sendChat} className="bg-white text-black p-2 rounded-lg"><i data-lucide="send" className="w-4 h-4"></i></button>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8">
                            {activeTab === 'dashboard' ? (
                                <div className="glass p-20 border-2 border-dashed border-white/10 flex flex-col items-center justify-center gap-6 group hover:border-white/20 transition-all cursor-pointer relative overflow-hidden">
                                    <i data-lucide="upload-cloud" className="w-16 h-16 opacity-20 group-hover:opacity-100 transition-all"></i>
                                    <h3 className="font-black text-2xl uppercase italic tracking-tighter">Inject Payload</h3>
                                    <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" />
                                </div>
                            ) : (
                                <div className="glass p-8 min-h-[600px]">
                                    <h2 className="text-4xl font-black uppercase italic mb-10" style={{color: theme.primary}}>Shadow Vault</h2>
                                    <div className="space-y-6">
                                        {orders.map(order => (
                                            <div key={order.id} className={`p-6 rounded-3xl border transition-all ${!order.psid ? 'bg-red-900/10 border-red-500/30 radar-pulse' : 'bg-white/[0.02] border-white/10'}`}>
                                                <div className="flex justify-between items-start mb-6">
                                                    <div>
                                                        <div className="text-3xl font-black uppercase tracking-tighter">{order.recipient_name}</div>
                                                        <div className="text-[10px] font-mono opacity-30 mt-1">TRACKING: {order.tracking_number}</div>
                                                    </div>
                                                    <div className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${order.psid ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>{order.psid ? 'LOCKED' : 'NO SIGNAL'}</div>
                                                </div>
                                                <div className="bg-black/50 p-4 rounded-2xl border border-white/5">
                                                    <span className="text-[9px] font-black uppercase opacity-20 block mb-3">PSID Injection Zone</span>
                                                    {editingId === order.id || !order.psid ? (
                                                        <div className="flex gap-2">
                                                            <input autoFocus value={psidInput} onChange={e => setPsidInput(e.target.value)} placeholder="👉 PASTE PSID HERE 👈" className="flex-1 bg-transparent border-b border-white/20 p-2 text-xl font-mono outline-none focus:border-purple-500" onKeyPress={e => e.key === 'Enter' && handleSavePsid(order.id)} />
                                                            <button onClick={() => handleSavePsid(order.id)} className="bg-white text-black px-6 py-2 rounded-xl font-black text-xs uppercase shadow-xl hover:scale-105 transition-all">Lock-On</button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex items-center justify-between group">
                                                            <span className="text-2xl font-mono text-white/70">{order.psid}</span>
                                                            <button onClick={() => {setEditingId(order.id); setPsidInput(order.psid);}} className="opacity-0 group-hover:opacity-100 p-2 text-white/20 hover:text-white"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="fixed bottom-0 w-full h-10 border-t border-white/5 bg-black/90 backdrop-blur-xl z-50 flex items-center overflow-hidden">
                        <div className="flex items-center gap-12 whitespace-nowrap animate-ticker">
                            {[1,2,3,4].map(i => (
                                <div key={i} className="flex items-center gap-8">
                                    <span className="text-[10px] font-black uppercase tracking-[0.5em] text-purple-400">V.61 AI SOVEREIGN ACTIVE</span>
                                    <span className="text-[10px] font-black uppercase tracking-[0.5em] text-white/30">ARMED: {stats.count} | TARGETS: {stats.ready} | REVENUE: ฿{stats.total.toLocaleString()}</span>
                                </div>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
