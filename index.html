<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB TITAN MATRIX CORE V.60 - AI POWERED</title>
    <!-- ⚡ CORE NEURAL LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 📦 FIREBASE SDKS (UMD) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- 🎨 ASSETS & ICONS -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010102; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .nebula { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: background 0.8s ease; }
        .glass { background: rgba(8, 8, 12, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .matrix-text { text-shadow: 0 0 15px currentColor; }
        .neon-border-purple { border: 1px solid rgba(168, 85, 247, 0.4); box-shadow: 0 0 20px rgba(168, 85, 247, 0.1); }
        .neon-border-orange { border: 1px solid rgba(249, 115, 22, 0.4); box-shadow: 0 0 20px rgba(249, 115, 22, 0.1); }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { animation: ticker 25s linear infinite; }
        .radar-pulse { animation: pulse-red 2s infinite ease-out; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 🛡️ CONFIGURATION GATEWAY ---
        // Note: Replace these with your actual Supabase/Firebase credentials if needed
        const config = {
            apiKey: "", // Gemini Key will be injected or used from state
            appId: typeof __app_id !== 'undefined' ? __app_id : 'darkside-bb-v4'
        };

        // --- ✨ AI NEURAL ENGINE ---
        const callGemini = async (prompt, systemPrompt = "You are the TITAN MATRIX AI. Supreme Military Strategist.") => {
            try {
                const geminiKey = ""; // Runtime Injection
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Communication Severed.";
            } catch (e) { return "Link Refused."; }
        };

        // --- 🏗️ MAIN COMMANDER COMPONENT ---
        function App() {
            const [brand, setBrand] = useState('BB');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [orders, setOrders] = useState([]);
            const [isBriefing, setIsBriefing] = useState(false);
            const [aiBriefing, setAiBriefing] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [psidInput, setPsidInput] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [aiChat, setAiChat] = useState([]);

            // Theme Computing
            const theme = useMemo(() => brand === 'BB' ? {
                primary: '#f0abfc', glow: '#e879f9', text: 'BB STORE', table: 'bb_orders_master', icon: 'stars'
            } : {
                primary: '#fed7aa', glow: '#fb923c', text: 'SINGTO', table: 'st_orders_master', icon: 'cat'
            }, [brand]);

            // Real-time Mock Stats (Connect to Firestore in production)
            const stats = useMemo(() => ({
                total: orders.reduce((s, o) => s + (Number(o.cod_amount) || 0), 0),
                count: orders.length,
                ready: orders.filter(o => o.strike_status === 'ready').length,
                missing: orders.filter(o => !o.psid).length
            }), [orders]);

            // --- ✨ AI COMMANDS ---
            const generateBriefing = async () => {
                setIsBriefing(true);
                const result = await callGemini(`Summarize store status: ${brand}, Revenue: ${stats.total}, Missing PSID: ${stats.missing}. Give 2 military tactical tips in Thai.`);
                setAiBriefing(result);
                setIsBriefing(false);
            };

            const sendChat = async () => {
                if (!chatInput.trim()) return;
                const userMsg = chatInput;
                setAiChat(p => [...p, { role: 'user', text: userMsg }]);
                setChatInput('');
                const response = await callGemini(userMsg);
                setAiChat(p => [...p, { role: 'ai', text: response }]);
            };

            const handleSavePsid = async (id) => {
                if (!psidInput.trim()) return;
                setIsSaving(true);
                // logic to update Firestore would go here
                // For now, we update local state to show the result
                setOrders(prev => prev.map(o => o.id === id ? { ...o, psid: psidInput, strike_status: 'ready' } : o));
                setEditingId(null);
                setPsidInput('');
                setIsSaving(false);
            };

            // Initialize Icons
            useEffect(() => { lucide.createIcons(); }, [activeTab, brand, aiBriefing, editingId]);

            return (
                <div className="relative min-h-screen">
                    <div className="nebula" style={{ background: `radial-gradient(circle at 50% 50%, ${brand === 'BB' ? 'rgba(147,51,234,0.08)' : 'rgba(234,88,12,0.06)'}, transparent 70%)` }} />
                    
                    {/* 🎖️ TOP NAVIGATION */}
                    <nav className="sticky top-0 z-50 p-4 border-b border-white/5 bg-black/40 backdrop-blur-2xl flex justify-between items-center px-6 md:px-12">
                        <div className="flex items-center gap-4">
                            <div className="p-2.5 rounded-2xl bg-white/5 border border-white/10" style={{color: theme.primary}}>
                                <i data-lucide={theme.icon} className="w-6 h-6"></i>
                            </div>
                            <div className="flex flex-col">
                                <span className="font-black uppercase tracking-[0.2em] text-lg matrix-text" style={{color: theme.primary}}>{theme.text} MATRIX</span>
                                <span className="text-[8px] font-bold text-white/40 tracking-[0.4em] uppercase italic">Supreme Commander V.60</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setBrand(brand === 'BB' ? 'SINGTO' : 'BB')} className="p-2.5 hover:bg-white/5 rounded-xl transition-all text-white/30 hover:text-white">
                                <i data-lucide="refresh-cw" className="w-5 h-5"></i>
                            </button>
                            <div className="flex bg-white/5 p-1 rounded-2xl border border-white/10 shadow-inner">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-6 py-2.5 rounded-xl text-xs font-black transition-all ${activeTab === 'dashboard' ? 'bg-white text-black shadow-xl scale-105' : 'text-white/30 hover:text-white'}`}>DASHBOARD</button>
                                <button onClick={() => setActiveTab('vault')} className={`px-6 py-2.5 rounded-xl text-xs font-black transition-all ${activeTab === 'vault' ? 'bg-white text-black shadow-xl scale-105' : 'text-white/30 hover:text-white'}`}>SHADOW VAULT</button>
                            </div>
                        </div>
                    </nav>

                    <main className="relative z-10 p-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 mt-6">
                        
                        {/* 📊 LEFT FLANK: INTELLIGENCE */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass p-8 space-y-8 neon-border-purple">
                                <div className="grid grid-cols-2 gap-8">
                                    <div>
                                        <span className="text-[10px] font-black text-white/30 uppercase tracking-widest block mb-2">Total COD</span>
                                        <div className="text-4xl font-light tracking-tighter">฿{stats.total.toLocaleString()}</div>
                                    </div>
                                    <div>
                                        <span className="text-[10px] font-black text-white/30 uppercase tracking-widest block mb-2">Assets</span>
                                        <div className="text-4xl font-light tracking-tighter">{stats.count}</div>
                                    </div>
                                </div>
                                <div className="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-purple-500 h-full shadow-[0_0_15px_#a855f7]" style={{width: '65%'}}></div>
                                </div>
                            </div>

                            {/* ✨ AI BRIEFING SYSTEM */}
                            <div className="glass p-8 space-y-6 border-l-4" style={{borderLeftColor: theme.primary}}>
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-3 font-black text-xs uppercase tracking-[0.2em]"><i data-lucide="brain" className="w-4 h-4 text-purple-400"></i> Neural briefing</div>
                                    <button onClick={generateBriefing} disabled={isBriefing} className="p-2.5 rounded-full bg-white text-black hover:scale-110 active:scale-95 transition-all shadow-[0_0_20px_#fff]">
                                        {isBriefing ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="zap"></i>}
                                    </button>
                                </div>
                                {aiBriefing ? (
                                    <div className="text-sm font
