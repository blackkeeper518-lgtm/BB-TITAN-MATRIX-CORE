<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB TITAN MATRIX CORE V.59</title>
    <!-- ⚡ HIGH-POWERED LIBRARIES -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010102; color: #f1f5f9; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .nebula { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: background 0.5s ease; }
        .glass { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
        .matrix-text { text-shadow: 0 0 15px currentColor; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-ticker { animation: ticker 30s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 🛡️ FIREBASE CORE (EMBEDDED) ---
        // Note: In a production environment, you would use standard imports. 
        // For a single HTML file, we'll use the Global Firebase object if available, 
        // or mock the UI for immediate visual feedback if credentials aren't initialized.
        
        const firebaseConfig = JSON.parse(__firebase_config || '{}');
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'darkside-bb-v4';
        const apiKey = ""; // Gemini API Key

        // --- ✨ AI NEURAL LINK ENGINE ---
        const callGemini = async (prompt, systemPrompt = "You are the TITAN MATRIX AI. Expert in sales psychology. Response in Thai.") => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Signal lost.";
            } catch (e) { return "Link Refused."; }
        };

        // --- 🏗️ MAIN COMMAND CENTER ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [brand, setBrand] = useState('BB');
            const [orders, setOrders] = useState([]); // In real app, sync with Firestore
            const [aiBriefing, setAiBriefing] = useState(null);
            const [isBriefing, setIsBriefing] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [aiChat, setAiChat] = useState([]);
            const [isChatting, setIsChatting] = useState(false);

            const theme = useMemo(() => brand === 'BB' ? { 
                primary: '#f0abfc', glow: '#e879f9', text: 'BB STORE', icon: 'Stars'
            } : { 
                primary: '#fed7aa', glow: '#fb923c', text: 'SINGTO', icon: 'Cat'
            }, [brand]);

            const stats = useMemo(() => ({
                total: orders.reduce((sum, o) => sum + (parseFloat(o.cod_amount) || 0), 0),
                count: orders.length,
                success: orders.filter(o => o.strike_status === 'success').length,
                missing: orders.filter(o => !o.psid).length
            }), [orders]);

            const generateBriefing = async () => {
                setIsBriefing(true);
                const briefing = await callGemini(`Analyze: Brand ${brand}, Orders ${stats.count}, Revenue ${stats.total}. Provide military briefing in Thai.`);
                setAiBriefing(briefing);
                setIsBriefing(false);
            };

            const sendChat = async () => {
                if (!chatInput.trim()) return;
                const msg = chatInput;
                setAiChat(p => [...p, { role: 'user', text: msg }]);
                setChatInput('');
                setIsChatting(true);
                const response = await callGemini(msg);
                setAiChat(p => [...p, { role: 'ai', text: response }]);
                setIsChatting(false);
            };

            return (
                <div className="relative min-h-screen">
                    <div className="nebula" style={{ background: `radial-gradient(circle at 50% 50%, ${brand === 'BB' ? 'rgba(147,51,234,0.1)' : 'rgba(234,88,12,0.08)'}, transparent 70%)` }} />
                    
                    {/* NAV */}
                    <nav className="sticky top-0 z-50 p-4 border-b border-white/5 bg-black/60 backdrop-blur-xl flex justify-between items-center px-6 md:px-12">
                        <div className="flex items-center gap-3">
                            <div className="p-2 rounded-xl bg-white/5 border border-white/10" style={{color: theme.primary}}>
                                <i data-lucide={brand === 'BB' ? "stars" : "cat"}></i>
                            </div>
                            <span className="font-black uppercase tracking-tighter text-xl matrix-text" style={{color: theme.primary}}>{theme.text} COMMAND</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setBrand(brand === 'BB' ? 'SINGTO' : 'BB')} className="p-2 hover:bg-white/5 rounded-lg transition-all text-white/50 hover:text-white">
                                <i data-lucide="refresh-cw" className="w-5 h-5"></i>
                            </button>
                            <div className="flex bg-white/5 p-1 rounded-xl border border-white/10">
                                <button onClick={() => setActiveTab('dashboard')} className={`px-5 py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'dashboard' ? 'bg-white text-black' : 'text-white/40'}`}>DASHBOARD</button>
                                <button onClick={() => setActiveTab('vault')} className={`px-5 py-2 rounded-lg text-xs font-bold transition-all ${activeTab === 'vault' ? 'bg-white text-black' : 'text-white/40'}`}>VAULT</button>
                            </div>
                        </div>
                    </nav>

                    <main className="relative z-10 p-6 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
                        {/* SIDEBAR: AI & STATS */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="glass p-6 grid grid-cols-2 gap-6 border-b-4" style={{borderBottomColor: theme.primary}}>
                                <div>
                                    <span className="text-[10px] font-black text-white/30 uppercase tracking-widest">Revenue</span>
                                    <div className="text-3xl font-light mt-1">฿{stats.total.toLocaleString()}</div>
                                </div>
                                <div>
                                    <span className="text-[10px] font-black text-white/30 uppercase tracking-widest">Targets</span>
                                    <div className="text-3xl font-light mt-1">{stats.count}</div>
                                </div>
                            </div>

                            {/* AI BRIEFING */}
                            <div className="glass p-6 space-y-4 border-l-4" style={{borderLeftColor: theme.primary}}>
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-2 font-black text-xs uppercase tracking-widest"><i data-lucide="brain" className="w-4 h-4"></i> AI Briefing</div>
                                    <button onClick={generateBriefing} className="p-2 rounded-full bg-white/5 hover:bg-white/10 text-yellow-400">
                                        {isBriefing ? <i data-lucide="loader-2" className="animate-spin"></i> : <i data-lucide="zap"></i>}
                                    </button>
                                </div>
                                {aiBriefing ? (
                                    <div className="text-sm font-mono text-white/70 leading-relaxed whitespace-pre-wrap animate-in fade-in duration-500">{aiBriefing}</div>
                                ) : (
                                    <div className="text-xs text-white/20 italic">Commander, sync the neural link for strategic data...</div>
                                )}
                            </div>

                            {/* NEURAL CHAT */}
                            <div className="glass p-6 flex flex-col h-[450px] shadow-2xl">
                                <div className="flex items-center gap-2 mb-6 font-black text-xs uppercase tracking-widest"><i data-lucide="message-circle" className="w-4 h-4 text-purple-400"></i> Neural Chat</div>
                                <div className="flex-1 overflow-y-auto space-y-4 pr-2 text-sm">
                                    {aiChat.length === 0 && <div className="text-center mt-20 opacity-10 font-black uppercase text-xl">Silence Protocol</div>}
                                    {aiChat.map((c, i) => (
                                        <div key={i} className={`flex ${c.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-[85%] p-4 rounded-2xl ${c.role === 'user' ? 'bg-white/10 rounded-tr-none' : 'bg-purple-600/20 border border-purple-500/30 rounded-tl-none text-purple-100'}`}>
                                                {c.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isChatting && <i data-lucide="loader-2" className="animate-spin w-4 h-4 opacity-30"></i>}
                                </div>
                                <div className="mt-6 flex gap-2">
                                    <input 
                                        value={chatInput} 
                                        onChange={e => setChatInput(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && sendChat()}
                                        placeholder="Command AI..."
                                        className="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 text-sm focus:border-white/20 outline-none transition-all"
                                    />
                                    <button onClick={sendChat} className="p-3 bg-white text-black rounded-2xl hover:scale-110 active:scale-95 transition-all shadow-xl"><i data-lucide="send" className="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>

                        {/* MAIN DASHBOARD */}
                        <div className="lg:col-span-8">
                            {activeTab === 'dashboard' ? (
                                <div className="space-y-8">
                                    <div className="glass p-20 border-2 border-dashed border-white/10 flex flex-col items-center justify-center gap-8 group hover:border-white/20 transition-all cursor-pointer relative overflow-hidden">
                                        <div className="absolute inset-0 bg-gradient-to-b from-white/[0.02] to-transparent pointer-events-none"></div>
                                        <div className="p-8 rounded-full bg-white/5 group-hover:scale-110 transition-all shadow-2xl"><i data-lucide="upload-cloud" className="w-16 h-16 opacity-50 group-hover:opacity-100"></i></div>
                                        <div className="text-center">
                                            <h3 className="font-black text-3xl uppercase italic tracking-tighter">Inject Order Payload</h3>
                                            <p className="text-sm text-white/30 mt-3 font-mono">DRAG & DROP CSV FILES TO ARM THE MATRIX</p>
                                        </div>
                                        <input type="file" className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="glass p-6 border-l-4 border-green-500">
                                            <span className="text-[10px] font-black text-green-500 uppercase tracking-widest">Active Strike</span>
                                            <div className="text-2xl mt-2 font-bold tracking-tight">V.59 READY</div>
                                        </div>
                                        <div className="glass p-6 border-l-4 border-red-500">
                                            <span className="text-[10px] font-black text-red-500 uppercase tracking-widest">Security Status</span>
                                            <div className="text-2xl mt-2 font-bold tracking-tight">ENCRYPTED</div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="glass p-8 min-h-[700px]">
                                    <div className="flex justify-between items-end mb-12">
                                        <div>
                                            <h2 className="text-5xl font-black uppercase italic tracking-tighter">Shadow Vault</h2>
                                            <p className="text-xs text-white/20 mt-2 tracking-[0.3em] font-bold">LATEST TARGET DATA ACQUIRED</p>
                                        </div>
                                        <div className="flex gap-6 text-[11px] font-black">
                                            <span className="text-red-500 px-4 py-2 bg-red-500/10 rounded-full border border-red-500/20">MISSING PSID: {stats.missing}</span>
                                            <span className="text-purple-500 px-4 py-2 bg-purple-500/10 rounded-full border border-purple-500/20">READY: {stats.success}</span>
                                        </div>
                                    </div>
                                    
                                    {orders.length === 0 ? (
                                        <div className="flex flex-col items-center justify-center h-[400px] opacity-20">
                                            <i data-lucide="database" className="w-20 h-20 mb-4"></i>
                                            <span className="font-black uppercase tracking-widest">Vault is Empty, Commander.</span>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {/* Order Rows would go here */}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>

                    {/* FOOTER TICKER */}
                    <footer className="fixed bottom-0 w-full h-12 border-t border-white/5 bg-black/90 backdrop-blur-2xl z-50 flex items-center overflow-hidden">
                        <div className="flex items-center gap-16 whitespace-nowrap animate-ticker">
                            {[1,2,3,4].map(i => (
                                <div key={i} className="flex items-center gap-12">
                                    <span className="text-[11px] font-black uppercase tracking-[0.5em] text-purple-400 matrix-text">SHADOW PROTOCOL V.59 ACTIVE</span>
                                    <i data-lucide="zap" className="w-3 h-3 text-white/20"></i>
                                    <span className="text-[11px] font-black uppercase tracking-[0.5em] text-white/40">ARMED: {stats.count} | SUCCESS: {stats.success} | REVENUE: ฿{stats.total.toLocaleString()}</span>
                                    <i data-lucide="shield" className="w-3 h-3 text-white/20"></i>
                                </div>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide Icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
